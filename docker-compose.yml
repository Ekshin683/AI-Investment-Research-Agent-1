version: "3.8"

services:

  # ── Backend Service ───────────────────────────────────────────────
  backend:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    container_name: ai-investment-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - TWELVE_DATA_API_KEY=${TWELVE_DATA_API_KEY}
      - FRONTEND_URL=http://localhost:80
    restart: unless-stopped
    networks:
      - ai-investment-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── Frontend Service ──────────────────────────────────────────────
  frontend:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: ai-investment-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ai-investment-network

# ── Network ───────────────────────────────────────────────────────
networks:
  ai-investment-network:
    driver: bridge